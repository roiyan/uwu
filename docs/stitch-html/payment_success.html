<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Modern Heirloom - Pembayaran Berhasil</title>

<link href="https://fonts.googleapis.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#b69ece",
                        "on-tertiary-fixed": "#251239",
                        "on-tertiary-container": "#47345d",
                        "on-error": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-surface": "#1e1b18",

                        "primary": "#914a3b",

                        "secondary-container": "#c2d5fd",
                        "on-secondary-fixed": "#061b3a",
                        "on-background": "#1e1b18",

                        "primary-fixed": "#ffdad3",
                        "on-surface-variant": "#54433f",
                        "tertiary-fixed-dim": "#d6bdee",
                        "secondary": "#4d5e81",
                        "secondary-fixed": "#d7e2ff",
                        "secondary-fixed-dim": "#b5c7ef",
                        "tertiary-fixed": "#efdbff",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#ffb4a4",
                        "surface-dim": "#e0d9d4",
                        "tertiary": "#6a5681",
                        "surface-variant": "#e9e1dc",
                        "inverse-surface": "#33302d",
                        "surface-container-low": "#faf2ed",
                        "on-primary-fixed": "#3b0902",
                        "inverse-on-surface": "#f7efea",
                        "error-container": "#ffdad6",

                        "on-error-container": "#93000a",
                        "surface-container": "#f4ece7",

                        "primary-fixed-dim": "#ffb4a4",
                        "on-primary-fixed-variant": "#743326",
                        "surface-tint": "#914a3b",
                        "surface": "#fff8f4",
                        "primary-container": "#e8917e",
                        "surface-container-highest": "#e9e1dc",
                        "error": "#ba1a1a",
                        "surface-container-high": "#efe7e2",
                        "outline-variant": "#d9c1bc",
                        "on-primary-container": "#672a1d",
                        "outline": "#86736e",
                        "background": "#fff8f4"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": [
                            "Noto Serif", "serif"
                        ],
                        "body": [
                            "Plus Jakarta Sans", "sans-serif"
                        ],
                        "label": [
                            "Plus Jakarta Sans", "sans-serif"
                        ]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: theme('colors.surface');
            color: theme('colors.on-surface');
            font-family: theme('fontFamily.body');
        }
        h1, h2, h3, h4, h5, h6, .font-headline {
            font-family: theme('fontFamily.headline');
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col antialiased">
<!-- TopNavBar (Transactional Intent - Suppressed Links, Logo Only) -->
<header class="fixed top-0 w-full z-50 bg-white/80 dark:bg-stone-900/80 backdrop-blur-xl no-border bg-surface-container-low/30 shadow-[0_4px_30px_rgba(0,0,0,0.04)]">
<div class="flex justify-between items-center px-8 py-4 max-w-screen-2xl mx-auto">
<a class="font-['Noto_Serif'] text-2xl font-bold italic text-[#914a3b] dark:text-[#E8917E]" href="#">Modern Heirloom</a>
</div>
</header>
<!-- Main Content -->
<main class="flex-grow flex items-center justify-center pt-24 pb-16 px-6">
<div class="w-full max-w-2xl mx-auto flex flex-col items-center text-center">
<!-- Success Icon / Illustration -->
<div class="mb-8 relative">
<div class="absolute inset-0 bg-primary-container/20 rounded-full blur-3xl scale-150"></div>
<div class="w-32 h-32 bg-surface-container-lowest rounded-full shadow-[0_20px_40px_rgba(30,27,24,0.06)] flex items-center justify-center relative z-10 border border-outline-variant/20">
<span class="material-symbols-outlined fill text-primary-container text-6xl" data-icon="check_circle">check_circle</span>
</div>
</div>
<!-- Typography -->
<h1 class="font-headline text-4xl md:text-5xl font-medium tracking-tight text-primary mb-4">Pembayaran Berhasil!</h1>
<p class="font-body text-lg text-on-surface-variant mb-12 max-w-md mx-auto">Paket PRO telah aktif untuk akun Anda</p>
<!-- Order Details Card (Bento Style) -->
<div class="w-full bg-surface-container-lowest rounded-lg p-8 md:p-10 mb-12 relative overflow-hidden shadow-[0_10px_40px_rgba(30,27,24,0.04)]">
<!-- Decorative Corner -->
<div class="absolute -top-12 -right-12 w-32 h-32 bg-surface-container-low rounded-full opacity-50 pointer-events-none"></div>
<h2 class="font-headline text-2xl text-on-surface mb-8 text-left border-b border-surface-container-low pb-4">Detail Pesanan</h2>
<div class="space-y-6 text-left">
<div class="flex flex-col sm:flex-row sm:justify-between items-start sm:items-center gap-2">
<span class="font-label text-sm text-outline uppercase tracking-wider font-semibold">ID Pesanan</span>
<span class="font-body font-medium text-on-surface">MH-ORD-882910</span>
</div>
<div class="flex flex-col sm:flex-row sm:justify-between items-start sm:items-center gap-2">
<span class="font-label text-sm text-outline uppercase tracking-wider font-semibold">Tanggal</span>
<span class="font-body font-medium text-on-surface">24 Oktober 2024</span>
</div>
<div class="flex flex-col sm:flex-row sm:justify-between items-start sm:items-center gap-2">
<span class="font-label text-sm text-outline uppercase tracking-wider font-semibold">Metode Pembayaran</span>
<span class="font-body font-medium text-on-surface flex items-center gap-2">
<span class="material-symbols-outlined text-outline text-xl" data-icon="credit_card">credit_card</span>
                            Kartu Kredit berakhiran 4242
                        </span>
</div>
<div class="pt-6 mt-6 border-t border-surface-container-high flex flex-col sm:flex-row sm:justify-between items-start sm:items-center gap-2">
<span class="font-headline text-lg text-on-surface">Total Pembayaran</span>
<span class="font-headline text-2xl text-primary font-medium">Rp 499.000</span>
</div>
</div>
</div>
<!-- Primary CTA -->
<button class="bg-gradient-to-tr from-primary to-primary-container text-on-primary rounded-full px-10 py-5 font-label font-semibold text-lg hover:opacity-90 transition-opacity duration-300 shadow-md shadow-primary-container/20 flex items-center gap-3 mb-6 w-full sm:w-auto justify-center group">
                Mulai Buat Undangan
                <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Secondary Info -->
<p class="font-body text-sm text-outline flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-base" data-icon="mail">mail</span>
                Invoice telah dikirim ke email Anda
            </p>
</div>
</main>
<!-- Footer (Suppressed for transactional success screen to keep focus) -->
</body></html>
