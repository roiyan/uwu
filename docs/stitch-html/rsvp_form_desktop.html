<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>RSVP - The Modern Heirloom</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&amp;family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary-fixed": "#3b0902",
                        "outline-variant": "#d9c1bc",
                        "on-tertiary-container": "#47345d",
                        "surface": "#fff8f4",
                        "tertiary-fixed-dim": "#d6bdee",
                        "surface-dim": "#e0d9d4",
                        "on-secondary-container": "#4a5c7e",
                        "inverse-on-surface": "#f7efea",
                        "inverse-primary": "#ffb4a4",
                        "surface-container-highest": "#e9e1dc",
                        "surface-container-lowest": "#ffffff",
                        "surface-tint": "#914a3b",
                        "background": "#fff8f4",
                        "secondary-fixed": "#d7e2ff",
                        "outline": "#86736e",
                        "tertiary": "#6a5681",
                        "primary-fixed": "#ffdad3",
                        "on-tertiary-fixed-variant": "#523e68",
                        "on-secondary-fixed-variant": "#354768",
                        "surface-container-low": "#faf2ed",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed-variant": "#743326",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#e9e1dc",
                        "secondary": "#4d5e81",
                        "on-primary-container": "#672a1d",
                        "on-error-container": "#93000a",
                        "primary-fixed-dim": "#ffb4a4",
                        "on-surface-variant": "#54433f",
                        "on-background": "#1e1b18",
                        "on-primary": "#ffffff",
                        "tertiary-container": "#b69ece",
                        "on-surface": "#1e1b18",
                        "error": "#ba1a1a",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#b5c7ef",
                        "surface-bright": "#fff8f4",
                        "surface-container": "#f4ece7",
                        "primary": "#914a3b",
                        "secondary-container": "#c2d5fd",
                        "inverse-surface": "#33302d",
                        "tertiary-fixed": "#efdbff",
                        "surface-container-high": "#efe7e2",
                        "primary-container": "#e8917e",
                        "on-secondary-fixed": "#061b3a",
                        "on-tertiary-fixed": "#251239",
                        "on-error": "#ffffff"
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Noto Serif", "serif"],
                        "body": ["Plus Jakarta Sans", "sans-serif"],
                        "label": ["Plus Jakarta Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body antialiased min-h-screen flex flex-col relative overflow-x-hidden">
<!-- Decorative Sakura Background Elements -->
<div class="fixed inset-0 pointer-events-none z-0 opacity-40">
<div class="absolute top-[-10%] left-[-5%] w-[40%] h-[40%] bg-[url('https://images.unsplash.com/photo-1522383225653-ed111181a951?auto=format&amp;fit=crop&amp;q=80&amp;w=1000')] bg-cover bg-center mix-blend-multiply opacity-20 blur-xl" data-alt="soft focus soft pink cherry blossoms sakura branches on light background delicate lighting"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[50%] h-[50%] bg-[url('https://images.unsplash.com/photo-1490750967868-88aa4486c946?auto=format&amp;fit=crop&amp;q=80&amp;w=1000')] bg-cover bg-center mix-blend-multiply opacity-10 blur-2xl" data-alt="abstract soft pink floral texture diffuse lighting gentle curves"></div>
</div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#fff8f4]/80 dark:bg-[#1E1B18]/80 backdrop-blur-xl shadow-[0_20px_50px_rgba(30,27,24,0.04)] bg-surface-container-low dark:bg-surface-container-high">
<div class="flex items-center justify-between px-8 py-6 w-full max-w-screen-2xl mx-auto">
<button class="text-[#914a3b] dark:text-[#E8917E] hover:opacity-70 transition-opacity duration-300 active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<div class="text-3xl font-headline italic tracking-tight lowercase text-[#914a3b] dark:text-[#E8917E]">
                u<span class="material-symbols-outlined text-2xl align-middle mx-0.5" data-icon="all_inclusive">all_inclusive</span>u
            </div>
<button class="text-[#914a3b] dark:text-[#E8917E] hover:opacity-70 transition-opacity duration-300 active:scale-95 transition-transform">
<span class="material-symbols-outlined" data-icon="favorite">favorite</span>
</button>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center pt-32 pb-24 px-4 z-10 relative">
<!-- RSVP Form Container -->
<div class="w-full max-w-[500px]">
<!-- Context & Greeting -->
<div class="text-center mb-10">
<h1 class="font-headline text-4xl md:text-5xl text-primary tracking-tight mb-4 -ml-1">Konfirmasi Kehadiran</h1>
<div class="inline-flex flex-col items-center">
<p class="text-sm font-label text-on-surface-variant uppercase tracking-widest mb-1">Kepada Yth. Bpk/Ibu/Saudara/i</p>
<div class="px-6 py-2 bg-surface-container-low rounded-full mt-2">
<span class="font-headline italic text-lg text-primary">[Nama Tamu]</span>
</div>
</div>
</div>
<!-- Form Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 md:p-10 shadow-[0_40px_80px_rgba(30,27,24,0.06)] border border-outline-variant/30 relative overflow-hidden">
<!-- Subtle Rose Gold Accent Line -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-[#C4956A] to-transparent opacity-40"></div>
<form class="space-y-8">
<!-- Radio Section: Kehadiran -->
<fieldset class="space-y-4">
<legend class="font-headline text-xl text-primary mb-4 w-full border-b border-surface-variant pb-2">Apakah Anda akan hadir?</legend>
<div class="grid grid-cols-1 gap-4">
<label class="relative flex cursor-pointer rounded-lg border border-outline-variant/50 bg-surface-container-low p-4 hover:bg-surface-container focus:outline-none transition-colors">
<input checked="" class="peer sr-only" name="attendance" type="radio" value="yes"/>
<span class="peer-checked:border-primary peer-checked:bg-surface-container-highest absolute inset-0 rounded-lg border-2 border-transparent transition-all pointer-events-none"></span>
<div class="flex items-center gap-4 relative z-10 w-full">
<div class="w-6 h-6 rounded-full border border-outline flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary-container transition-colors">
<span class="material-symbols-outlined text-sm text-on-primary opacity-0 peer-checked:opacity-100 transition-opacity" data-icon="check" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check</span>
</div>
<div class="flex-grow">
<span class="font-body font-medium text-on-surface">Ya, saya akan hadir</span>
</div>
<span class="material-symbols-outlined text-primary/60" data-icon="celebration">celebration</span>
</div>
</label>
<label class="relative flex cursor-pointer rounded-lg border border-outline-variant/50 bg-surface-container-low p-4 hover:bg-surface-container focus:outline-none transition-colors">
<input class="peer sr-only" name="attendance" type="radio" value="no"/>
<span class="peer-checked:border-primary peer-checked:bg-surface-container-highest absolute inset-0 rounded-lg border-2 border-transparent transition-all pointer-events-none"></span>
<div class="flex items-center gap-4 relative z-10 w-full">
<div class="w-6 h-6 rounded-full border border-outline flex items-center justify-center peer-checked:border-primary peer-checked:bg-primary-container transition-colors">
<span class="material-symbols-outlined text-sm text-on-primary opacity-0 peer-checked:opacity-100 transition-opacity" data-icon="close" data-weight="fill" style="font-variation-settings: 'FILL' 1;">close</span>
</div>
<div class="flex-grow">
<span class="font-body font-medium text-on-surface">Maaf, saya tidak bisa hadir</span>
</div>
</div>
</label>
</div>
</fieldset>
<!-- Stepper Section: Jumlah Tamu -->
<div class="space-y-4">
<label class="block font-headline text-xl text-primary border-b border-surface-variant pb-2">Jumlah Tamu</label>
<div class="flex items-center justify-between bg-surface-container-low p-4 rounded-lg border border-outline-variant/30">
<span class="font-body text-on-surface-variant">Berapa orang yang akan hadir?</span>
<div class="flex items-center gap-4 bg-surface-container-highest rounded-full px-2 py-1">
<button aria-label="Kurangi" class="w-8 h-8 flex items-center justify-center rounded-full text-primary hover:bg-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<span class="font-headline text-xl text-on-surface w-4 text-center">2</span>
<button aria-label="Tambah" class="w-8 h-8 flex items-center justify-center rounded-full text-primary hover:bg-surface-variant transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</div>
<p class="text-xs font-label text-on-surface-variant/70 italic">*Maksimal 2 tamu sesuai undangan.</p>
</div>
<!-- Textarea Section: Ucapan & Doa -->
<div class="space-y-4 pt-4">
<label class="block font-headline text-xl text-primary border-b border-surface-variant pb-2" for="wishes">Ucapan &amp; Doa</label>
<div class="relative group">
<textarea class="w-full bg-surface-container-low border-b border-outline-variant border-x-0 border-t-0 rounded-t-sm px-4 py-3 font-body text-on-surface focus:ring-0 focus:border-primary transition-colors resize-none placeholder-on-surface-variant/50" id="wishes" name="wishes" placeholder="Tuliskan pesan manis untuk kedua mempelai..." rows="4"></textarea>
</div>
</div>
<!-- Submit CTA -->
<div class="pt-6">
<button class="w-full py-4 rounded-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-body font-medium text-lg shadow-lg shadow-primary-container/20 hover:shadow-xl hover:shadow-primary-container/30 transition-all transform hover:-translate-y-0.5 active:translate-y-0 flex items-center justify-center gap-2" type="submit">
<span>Kirim Konfirmasi</span>
<span class="material-symbols-outlined text-sm" data-icon="send">send</span>
</button>
</div>
</form>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full py-12 bg-[#fff8f4] dark:bg-[#1E1B18] border-t border-[#d9c1bc]/20 flex flex-col items-center gap-6 text-center z-10 relative">
<nav class="flex gap-6">
<a class="font-body text-[11px] uppercase tracking-widest text-[#1E1B18]/40 dark:text-[#fff8f4]/40 hover:text-[#E8917E] dark:hover:text-[#914a3b] underline-offset-4 hover:underline transition-colors" href="#">Registry</a>
<a class="font-body text-[11px] uppercase tracking-widest text-[#1E1B18]/40 dark:text-[#fff8f4]/40 hover:text-[#E8917E] dark:hover:text-[#914a3b] underline-offset-4 hover:underline transition-colors" href="#">Travel</a>
<a class="font-body text-[11px] uppercase tracking-widest text-[#1E1B18]/40 dark:text-[#fff8f4]/40 hover:text-[#E8917E] dark:hover:text-[#914a3b] underline-offset-4 hover:underline transition-colors" href="#">Gallery</a>
</nav>
<p class="font-body text-[11px] uppercase tracking-widest text-[#914a3b] dark:text-[#E8917E]">
            © 2024 The Modern Heirloom. All rights reserved.
        </p>
</footer>
</body></html>
