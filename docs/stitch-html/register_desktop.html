<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Daftar - UWU Wedding Platform</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "primary-fixed-dim": "#c3c0ff",
                      "surface-container-low": "#f0f3ff",
                      "error-container": "#ffdad6",
                      "on-primary-container": "#c1beff",
                      "inverse-surface": "#263143",
                      "surface-container-lowest": "#ffffff",
                      "inverse-primary": "#c3c0ff",
                      "tertiary-fixed-dim": "#ffb2bc",
                      "secondary-fixed": "#ffdbcf",
                      "tertiary": "#612833",
                      "surface-variant": "#d8e3fb",
                      "on-tertiary-fixed-variant": "#70343e",
                      "on-primary-fixed-variant": "#372abf",
                      "surface-container-highest": "#d8e3fb",
                      "on-tertiary-container": "#ffafba",
                      "surface-dim": "#cfdaf2",
                      "on-secondary-fixed": "#380c00",
                      "on-surface": "#111c2d",
                      "primary-container": "#4338ca",
                      "on-secondary-fixed-variant": "#822800",
                      "on-secondary": "#ffffff",
                      "surface-container-high": "#dee8ff",
                      "primary": "#2a14b4",
                      "surface-container": "#e7eeff",
                      "tertiary-fixed": "#ffd9dd",
                      "background": "#f9f9ff",
                      "on-tertiary-fixed": "#3a0915",
                      "on-secondary-container": "#6b1f00",
                      "primary-fixed": "#e3dfff",
                      "outline-variant": "#c7c4d7",
                      "inverse-on-surface": "#ecf1ff",
                      "on-primary-fixed": "#100069",
                      "on-error": "#ffffff",
                      "surface-bright": "#f9f9ff",
                      "on-background": "#111c2d",
                      "on-error-container": "#93000a",
                      "error": "#ba1a1a",
                      "tertiary-container": "#7d3e49",
                      "surface-tint": "#5148d7",
                      "on-tertiary": "#ffffff",
                      "surface": "#f9f9ff",
                      "on-surface-variant": "#464554",
                      "secondary-fixed-dim": "#ffb59c",
                      "secondary-container": "#fe7e4f",
                      "on-primary": "#ffffff",
                      "secondary": "#a43c12",
                      "outline": "#777586"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "1.5rem",
                      "full": "9999px"
              },
              "spacing": {},
              "fontFamily": {
                      "headline": ["Plus Jakarta Sans", "sans-serif"],
                      "body": ["Be Vietnam Pro", "sans-serif"],
                      "label": ["Be Vietnam Pro", "sans-serif"]
              }
      },
          },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex selection:bg-primary-fixed-dim selection:text-on-primary-fixed">
<!-- Split Layout Container -->
<div class="flex w-full min-h-screen">
<!-- Left Side: Editorial Illustration Pane (Hidden on small screens) -->
<div class="hidden lg:flex lg:w-[45%] xl:w-1/2 relative bg-surface-container-low overflow-hidden items-center justify-center p-12">
<!-- Decorative Background Blob -->
<div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-tertiary-fixed rounded-full mix-blend-multiply filter blur-3xl opacity-60"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary-fixed rounded-full mix-blend-multiply filter blur-3xl opacity-40"></div>
<!-- Ethereal Illustration -->
<div class="relative z-10 w-full max-w-lg aspect-square rounded-[2rem] overflow-hidden shadow-[0_40px_80px_rgba(17,28,45,0.08)]">
<img alt="Ethereal Atelier Wedding Illustration" class="w-full h-full object-cover" data-alt="abstract elegant flat 2d wedding illustration with minimalist shapes deep indigo and soft rose gold accents ethereal feeling" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDZ4Mtilx_Y5oko7FKCtulWfpALnA09S-ygamhawSnExGaK0Co4IFgkL13NzibXz_qhOooOYjkwO9VlT42S4D2-xOZ2U0wcdKUq40pi_H2WCTV9ViogC7qhSQ3RU_SlQxJy4YWg1YXmeMqqXCQ2-9MGap49NDt8FkmJv33gyCbjAglvVVZN9ohSfTyokJ4L8EDfqJolvL-Ie7uwvMjHA_70BxRieUyVrz8dmvyYac0yWQTtIcIq9FEN0F3_ZCdbWClkVHiM4BFymw"/>
</div>
<!-- Brand overlay text -->
<div class="absolute bottom-12 left-12 right-12 z-20">
<h2 class="font-headline text-3xl font-bold text-primary mb-2 tracking-tight">The Ethereal Atelier</h2>
<p class="font-body text-on-surface-variant text-lg">Momen berharga, dirajut dengan keanggunan digital.</p>
</div>
</div>
<!-- Right Side: Registration Form Canvas -->
<div class="w-full lg:w-[55%] xl:w-1/2 flex items-center justify-center p-6 sm:p-12 lg:p-24 relative bg-surface">
<!-- Mobile Decorative Elements (Hidden on Desktop) -->
<div class="lg:hidden absolute top-0 left-0 w-full h-64 bg-gradient-to-b from-surface-container-low to-surface z-0"></div>
<!-- Registration Card -->
<div class="w-full max-w-[440px] bg-surface-container-lowest rounded-xl p-8 sm:p-10 shadow-[0_30px_60px_rgba(17,28,45,0.06)] relative z-10">
<!-- Brand Logo -->
<div class="mb-8 flex items-center justify-center lg:justify-start">
<span class="font-headline text-2xl font-extrabold text-primary tracking-tighter flex items-center gap-2">
<span class="material-symbols-outlined text-tertiary" style="font-variation-settings: 'FILL' 1;">favorite</span>
                        UWU
                    </span>
</div>
<!-- Header -->
<div class="mb-8 text-center lg:text-left">
<h1 class="font-headline text-[2rem] leading-tight font-bold text-on-surface mb-2 tracking-tight">Buat Akun Gratis</h1>
<p class="font-body text-on-surface-variant text-base">Mulai perjalanan menuju pernikahan impian Anda bersama kami.</p>
</div>
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-3 bg-surface-container py-3.5 px-4 rounded-full text-on-surface font-label font-medium hover:bg-surface-container-high transition-colors mb-6 ring-1 ring-outline-variant/20" type="button">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Daftar dengan Google
                </button>
<!-- Divider -->
<div class="flex items-center mb-6">
<div class="flex-grow h-px bg-outline-variant/30"></div>
<span class="px-4 text-sm font-label text-on-surface-variant">atau</span>
<div class="flex-grow h-px bg-outline-variant/30"></div>
</div>
<!-- Registration Form -->
<form class="space-y-5">
<!-- Name Field -->
<div class="space-y-1.5">
<label class="block font-label text-sm font-medium text-on-surface-variant" for="fullName">Nama Lengkap</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined" style="font-size: 20px;">person</span>
</span>
<input class="w-full bg-surface-container-lowest text-on-surface font-body text-base rounded-xl py-3 pl-11 pr-4 ring-1 ring-outline-variant/20 focus:outline-none focus:ring-2 focus:ring-surface-tint focus:border-transparent transition-shadow placeholder:text-outline/60" id="fullName" placeholder="Masukkan nama Anda" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-1.5">
<label class="block font-label text-sm font-medium text-on-surface-variant" for="email">Alamat Email</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined" style="font-size: 20px;">mail</span>
</span>
<input class="w-full bg-surface-container-lowest text-on-surface font-body text-base rounded-xl py-3 pl-11 pr-4 ring-1 ring-outline-variant/20 focus:outline-none focus:ring-2 focus:ring-surface-tint focus:border-transparent transition-shadow placeholder:text-outline/60" id="email" placeholder="nama@email.com" type="email"/>
</div>
</div>
<!-- WhatsApp Field -->
<div class="space-y-1.5">
<label class="block font-label text-sm font-medium text-on-surface-variant" for="whatsapp">Nomor WhatsApp</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined" style="font-size: 20px;">call</span>
</span>
<input class="w-full bg-surface-container-lowest text-on-surface font-body text-base rounded-xl py-3 pl-11 pr-4 ring-1 ring-outline-variant/20 focus:outline-none focus:ring-2 focus:ring-surface-tint focus:border-transparent transition-shadow placeholder:text-outline/60" id="whatsapp" placeholder="0812-3456-7890" type="tel"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-1.5 mb-8">
<label class="block font-label text-sm font-medium text-on-surface-variant" for="password">Kata Sandi</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined" style="font-size: 20px;">lock</span>
</span>
<input class="w-full bg-surface-container-lowest text-on-surface font-body text-base rounded-xl py-3 pl-11 pr-12 ring-1 ring-outline-variant/20 focus:outline-none focus:ring-2 focus:ring-surface-tint focus:border-transparent transition-shadow placeholder:text-outline/60" id="password" placeholder="Minimal 8 karakter" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-on-surface transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-secondary-container text-on-secondary-container rounded-full py-3.5 px-6 font-label font-medium text-base hover:bg-secondary-fixed transition-colors shadow-[0_8px_16px_rgba(254,126,79,0.2)] focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-secondary-container" type="submit">
                        Daftar Sekarang
                    </button>
</form>
<!-- Footer / Login Link -->
<p class="mt-8 text-center font-body text-sm text-on-surface-variant">
                    Sudah punya akun? 
                    <a class="font-label font-semibold text-primary hover:text-primary-container transition-colors" href="#">Masuk di sini</a>
</p>
</div>
</div>
</div>
</body></html>
