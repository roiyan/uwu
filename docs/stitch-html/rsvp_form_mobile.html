<div class="font-serif italic tracking-tight text-3xl font-serif lowercase text-[#914a3b] dark:text-[#E8917E]">
                U∞U

</div>
<!-- Main Form Card Overlapping Hero -->
<div class="w-full max-w-3xl px-4 z-10 -mt-20 md:-mt-40 mb-12">
<div class="bg-surface-container-lowest rounded-xl p-8 md:p-16 shadow-[0_40px_60px_rgba(30,27,24,0.06)] border border-outline-variant/30 relative">
<!-- Header Section -->
<div class="text-center mb-12">
<span class="material-symbols-outlined text-primary mb-4 text-4xl" style="font-variation-settings: 'wght' 200;">local_florist</span>
<h1 class="font-headline text-4xl md:text-5xl text-primary tracking-tight mb-6">Konfirmasi Kehadiran</h1>
<div class="inline-block border-b border-outline-variant pb-2">
<p class="font-label text-sm uppercase tracking-widest text-on-surface-variant">Kepada Yth. Bpk/Ibu/Saudara/i</p>
<p class="font-headline text-2xl text-on-surface mt-2 italic">Alya &amp; Keluarga</p>
</div>
</div>
<!-- Form Area -->
<form class="flex flex-col gap-10">
<!-- 1. Attendance Radio Cards -->
<div class="space-y-4">
<label class="font-label text-sm uppercase tracking-wider text-on-surface-variant block mb-2">Kehadiran Anda</label>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<!-- Option: Hadir -->
<label class="relative flex flex-col bg-surface-container-low p-6 rounded-lg cursor-pointer hover:bg-surface-container transition-colors ring-1 ring-transparent hover:ring-outline-variant/50 group">
<input checked="" class="sr-only" name="attendance" type="radio" value="hadir"/>
<div class="flex items-center justify-between mb-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">check_circle</span>
<div class="w-4 h-4 rounded-full border border-primary group-focus-within:bg-primary flex items-center justify-center bg-primary">
<div class="w-2 h-2 rounded-full bg-white"></div>
</div>
</div>
<span class="font-headline text-lg text-on-surface mb-1">Pasti Hadir</span>
<span class="font-body text-xs text-on-surface-variant">Saya akan hadir merayakan momen ini.</span>
</label>
<!-- Option: Tidak Hadir -->
<label class="relative flex flex-col bg-surface-container-low p-6 rounded-lg cursor-pointer hover:bg-surface-container transition-colors ring-1 ring-transparent hover:ring-outline-variant/50 group">
<input class="sr-only" name="attendance" type="radio" value="tidak_hadir"/>
<div class="flex items-center justify-between mb-2">
<span class="material-symbols-outlined text-on-surface-variant">cancel</span>
<div class="w-4 h-4 rounded-full border border-outline-variant group-focus-within:border-primary"></div>
</div>
<span class="font-headline text-lg text-on-surface mb-1">Maaf, Tidak Hadir</span>
<span class="font-body text-xs text-on-surface-variant">Saya berhalangan untuk hadir.</span>
</label>
<!-- Option: Belum Pasti -->
<label class="relative flex flex-col bg-surface-container-low p-6 rounded-lg cursor-pointer hover:bg-surface-container transition-colors ring-1 ring-transparent hover:ring-outline-variant/50 group">
<input class="sr-only" name="attendance" type="radio" value="belum_pasti"/>
<div class="flex items-center justify-between mb-2">
<span class="material-symbols-outlined text-on-surface-variant">help</span>
<div class="w-4 h-4 rounded-full border border-outline-variant group-focus-within:border-primary"></div>
</div>
<span class="font-headline text-lg text-on-surface mb-1">Belum Pasti</span>
<span class="font-body text-xs text-on-surface-variant">Saya akan konfirmasi kembali nanti.</span>
</label>
</div>
</div>
<!-- 2. Guest Count Stepper -->
<div class="space-y-2 relative pt-2 group">
<label class="font-label text-sm uppercase tracking-wider text-on-surface-variant block transition-all duration-200" for="guest_count">Jumlah Tamu</label>
<p class="text-xs text-on-surface-variant/70 mb-2">Jumlah orang yang hadir (termasuk Anda)</p>
<div class="flex items-center gap-4">
<button class="w-10 h-10 rounded-full flex items-center justify-center border border-outline-variant text-on-surface-variant hover:bg-surface-container hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">remove</span>
</button>
<input class="w-16 text-center font-headline text-2xl bg-transparent border-none focus:ring-0 text-on-surface p-0" id="guest_count" max="5" min="1" name="guest_count" readonly="" type="number" value="2"/>
<button class="w-10 h-10 rounded-full flex items-center justify-center border border-outline-variant text-on-surface-variant hover:bg-surface-container hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</div>
<!-- 3. Message Textarea -->
<div class="space-y-2 relative pt-4 group">
<label class="font-label text-sm uppercase tracking-wider text-primary block transition-all duration-200" for="message">Ucapan &amp; Doa</label>
<textarea class="w-full bg-transparent border-0 border-b border-outline-variant px-0 py-2 font-body text-on-surface focus:ring-0 focus:border-primary transition-colors resize-none placeholder:text-on-surface-variant/40" id="message" name="message" placeholder="Tulis ucapan dan doa untuk pengantin..." rows="3"></textarea>
</div>
<!-- Submit Button -->
<div class="pt-6">
<button class="w-full rounded-full bg-gradient-to-tr from-primary to-primary-container text-on-primary py-5 font-label text-sm tracking-widest uppercase hover:opacity-90 transition-opacity flex items-center justify-center gap-2 shadow-[0_10px_20px_rgba(232,145,126,0.2)]" type="submit">
                            Kirim Konfirmasi
                            <span class="material-symbols-outlined text-sm">send</span>
</button>
</div>
</form>
</div>
</div>
