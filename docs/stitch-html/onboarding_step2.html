<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>uwu - Detail Acara Pernikahan</title>

                        "error-container": "#ffdad6",
                        "on-primary-fixed": "#3b0902",
                        "on-tertiary-fixed": "#251239",
                        "on-background": "#1e1b18",

                        "on-tertiary-fixed-variant": "#523e68",
                        "secondary": "#4d5e81",

                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Noto Serif"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]

            },
        }

<style>
        body {
            background-color: theme('colors.background');
            color: theme('colors.on-background');
            font-family: theme('fontFamily.body');
        }
        h1, h2, h3, h4, h5, h6, .font-headline {
            font-family: theme('fontFamily.headline');
        }
        .glass-panel {
            background: rgba(255, 248, 244, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .input-underline {
            border: none;
            border-bottom: 1px solid theme('colors.outline-variant');
            border-radius: 0;
            background: transparent;
            transition: all 0.2s ease-in-out;
        }
        .input-underline:focus {
            outline: none;
            box-shadow: none;
            border-bottom: 2px solid theme('colors.primary');
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
<!-- Top Navigation Placeholder (Hidden for flow context as per intent) -->
<main class="w-full max-w-[700px] flex flex-col gap-8">
<!-- Header & Progress -->
<header class="text-center space-y-4">
<div class="flex justify-center items-center gap-2 mb-4 text-primary">
<span class="material-symbols-outlined text-xs" style="font-variation-settings: 'FILL' 1;">circle</span>
<div class="w-8 h-[2px] bg-primary"></div>
<span class="material-symbols-outlined text-xs" style="font-variation-settings: 'FILL' 1;">circle</span>
<div class="w-8 h-[2px] bg-outline-variant"></div>
<span class="material-symbols-outlined text-xs text-outline-variant">circle</span>
<div class="w-8 h-[2px] bg-outline-variant"></div>
<span class="material-symbols-outlined text-xs text-outline-variant">circle</span>
</div>
<p class="text-sm font-medium text-secondary tracking-widest uppercase">Langkah 2 dari 4</p>
<h1 class="text-4xl md:text-5xl font-headline italic font-light tracking-tight text-on-background">Kapan &amp; Di Mana?</h1>
<p class="text-lg text-on-surface-variant max-w-lg mx-auto">Mari catat detail acara pernikahan Anda agar para tamu bisa bersiap.</p>
</header>
<!-- Main Form Area -->
<div class="space-y-6">
<!-- Acara 1: Akad Nikah Card -->
<section class="bg-surface-container-lowest rounded-xl p-6 sm:p-8 shadow-[0_10px_40px_rgba(30,27,24,0.03)] border border-outline-variant/20 relative overflow-hidden group">
<div class="absolute top-0 left-0 w-1 h-full bg-primary opacity-50 group-hover:opacity-100 transition-opacity"></div>
<div class="flex justify-between items-center mb-6 cursor-pointer">
<h2 class="text-2xl font-headline text-on-background">Acara 1 — Akad Nikah</h2>
<span class="material-symbols-outlined text-on-surface-variant">expand_less</span>
</div>
<div class="space-y-6">
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div class="relative group">
<label class="block text-sm font-medium text-on-surface-variant mb-1 group-focus-within:text-primary transition-colors">Tanggal</label>
<input class="w-full input-underline text-on-background py-2" placeholder="Pilih Tanggal" type="date"/>
</div>
<div class="relative group">
<label class="block text-sm font-medium text-on-surface-variant mb-1 group-focus-within:text-primary transition-colors">Waktu</label>
<input class="w-full input-underline text-on-background py-2" placeholder="08:00" type="time"/>
</div>
</div>
<div class="relative group">
<label class="block text-sm font-medium text-on-surface-variant mb-1 group-focus-within:text-primary transition-colors">Lokasi Lengkap</label>
<input class="w-full input-underline text-on-background py-2" placeholder="Nama Gedung / Masjid, Alamat" type="text"/>
</div>
<div class="relative group">
<label class="block text-sm font-medium text-on-surface-variant mb-1 group-focus-within:text-primary transition-colors">Dresscode (Opsional)</label>
<input class="w-full input-underline text-on-background py-2" placeholder="Misal: Putih / Pastel" type="text"/>
</div>
</div>
</section>
<!-- Add Event Button -->
<button class="w-full py-4 border border-outline-variant border-dashed rounded-xl flex items-center justify-center gap-2 text-secondary hover:bg-surface-container-low transition-colors duration-300">
<span class="material-symbols-outlined text-sm">add</span>
<span class="font-medium">Tambah Acara (Resepsi, Ngunduh Mantu, dll)</span>
</button>
</div>
<!-- Action Buttons -->
<div class="flex justify-between items-center pt-8 mt-4 border-t border-outline-variant/30">
<button class="px-6 py-3 rounded-full text-secondary font-medium hover:bg-surface-container-low transition-colors flex items-center gap-2">
<span class="material-symbols-outlined text-sm">arrow_back</span>
                Kembali
            </button>
<button class="px-8 py-3 rounded-full bg-gradient-to-tr from-primary to-primary-container text-on-primary font-medium shadow-[0_4px_14px_rgba(232,145,126,0.3)] hover:shadow-[0_6px_20px_rgba(232,145,126,0.4)] transition-all flex items-center gap-2">
                Lanjutkan
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</main>
</body></html>
