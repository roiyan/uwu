</div>

<div class="relative">

</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-label text-on-surface-variant ml-1" for="password">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-0 ring-1 ring-outline-variant/20 rounded-xl px-4 py-3.5 text-on-surface font-body outline-none focus:ring-2 focus:ring-surface-tint/50 transition-shadow placeholder:text-outline/50" id="password" placeholder="••••••••" type="password"/>

<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
