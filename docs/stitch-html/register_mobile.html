<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Daftar - UWU Wedding Platform</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#c3c0ff",
                        "surface-container-low": "#f0f3ff",
                        "error-container": "#ffdad6",
                        "on-primary-container": "#c1beff",
                        "inverse-surface": "#263143",
                        "surface-container-lowest": "#ffffff",
                        "inverse-primary": "#c3c0ff",
                        "tertiary-fixed-dim": "#ffb2bc",
                        "secondary-fixed": "#ffdbcf",
                        "tertiary": "#612833",
                        "surface-variant": "#d8e3fb",
                        "on-tertiary-fixed-variant": "#70343e",
                        "on-primary-fixed-variant": "#372abf",
                        "surface-container-highest": "#d8e3fb",
                        "on-tertiary-container": "#ffafba",
                        "surface-dim": "#cfdaf2",
                        "on-secondary-fixed": "#380c00",
                        "on-surface": "#111c2d",
                        "primary-container": "#4338ca",
                        "on-secondary-fixed-variant": "#822800",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#dee8ff",
                        "primary": "#2a14b4",
                        "surface-container": "#e7eeff",
                        "tertiary-fixed": "#ffd9dd",
                        "background": "#f9f9ff",
                        "on-tertiary-fixed": "#3a0915",
                        "on-secondary-container": "#6b1f00",
                        "primary-fixed": "#e3dfff",
                        "outline-variant": "#c7c4d7",
                        "inverse-on-surface": "#ecf1ff",
                        "on-primary-fixed": "#100069",
                        "on-error": "#ffffff",
                        "surface-bright": "#f9f9ff",
                        "on-background": "#111c2d",
                        "on-error-container": "#93000a",
                        "error": "#ba1a1a",
                        "tertiary-container": "#7d3e49",
                        "surface-tint": "#5148d7",
                        "on-tertiary": "#ffffff",
                        "surface": "#f9f9ff",
                        "on-surface-variant": "#464554",
                        "secondary-fixed-dim": "#ffb59c",
                        "secondary-container": "#fe7e4f",
                        "on-primary": "#ffffff",
                        "secondary": "#a43c12",
                        "outline": "#777586"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans", "sans-serif"],
                        "body": ["Be Vietnam Pro", "sans-serif"],
                        "label": ["Be Vietnam Pro", "sans-serif"]
                    }
                }
            }
        }
    </script>
<style>
        /* Floating Label CSS Logic */
        .floating-input:focus-within label,
        .floating-input input:not(:placeholder-shown) ~ label {
            transform: translateY(-50%) scale(0.85);
            top: 0;
            background-color: var(--tw-surface-container-lowest, #ffffff);
            padding: 0 4px;
            color: var(--tw-surface-tint, #5148d7);
        }
        
        .floating-input input:not(:placeholder-shown) ~ label {
            color: var(--tw-on-surface-variant, #464554);
        }

        .floating-input:focus-within input {
            border-bottom-color: var(--tw-surface-tint, #5148d7);
            border-bottom-width: 2px;
        }

        /* Hide default number arrows */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen relative overflow-hidden flex items-center justify-center p-4 md:p-8">
<!-- Ambient Background Elements (Ethereal Atelier Style) -->
<div class="fixed top-[-10%] left-[-5%] w-[40vw] h-[40vw] rounded-full bg-primary-fixed-dim opacity-40 blur-[100px] -z-10 mix-blend-multiply"></div>
<div class="fixed bottom-[-10%] right-[-5%] w-[35vw] h-[35vw] rounded-full bg-tertiary-fixed-dim opacity-30 blur-[80px] -z-10 mix-blend-multiply"></div>
<!-- Main Registration Card -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_30px_60px_rgba(17,28,45,0.06)] relative z-10 border border-outline-variant/10">
<div class="p-8 sm:p-10">
<!-- Header Section -->
<div class="text-center mb-8">
<!-- Text Logo (UWU) -->
<div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-surface-container-low mb-6">
<span class="font-headline font-extrabold text-xl tracking-tighter text-primary">UWU</span>
</div>
<h1 class="font-headline text-3xl font-bold tracking-tight text-on-surface mb-2">Buat Akun Gratis</h1>
<p class="text-body-sm text-on-surface-variant">Mulailah merencanakan pernikahan impianmu hari ini.</p>
</div>
<!-- Social Login -->
<button class="w-full flex items-center justify-center gap-3 py-3 px-4 border border-outline-variant/20 rounded-full hover:bg-surface-container-low transition-colors duration-200 group">
<svg class="w-5 h-5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
<span class="font-medium text-on-surface group-hover:text-primary transition-colors">Daftar dengan Google</span>
</button>
<!-- Divider -->
<div class="relative flex py-6 items-center">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="flex-shrink-0 mx-4 text-xs font-medium text-on-surface-variant uppercase tracking-wider">atau daftar dengan email</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<!-- Form -->
<form action="#" class="space-y-5" method="POST">
<!-- Nama Lengkap (Floating Label) -->
<div class="relative floating-input h-14">
<input class="peer w-full h-full bg-transparent border border-outline-variant/30 rounded-lg px-4 pt-2 text-on-surface focus:outline-none focus:border-surface-tint focus:border-b-2 transition-all" id="nama" name="nama" placeholder=" " required="" type="text"/>
<label class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm transition-all pointer-events-none bg-surface-container-lowest px-1" for="nama">Nama Lengkap</label>
</div>
<!-- Email (Floating Label) -->
<div class="relative floating-input h-14">
<input class="peer w-full h-full bg-transparent border border-outline-variant/30 rounded-lg px-4 pt-2 text-on-surface focus:outline-none focus:border-surface-tint focus:border-b-2 transition-all" id="email" name="email" placeholder=" " required="" type="email"/>
<label class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm transition-all pointer-events-none bg-surface-container-lowest px-1" for="email">Alamat Email</label>
</div>
<!-- WhatsApp (Prefix + Input) -->
<div class="relative h-14 flex rounded-lg border border-outline-variant/30 focus-within:border-surface-tint focus-within:border-b-2 transition-all overflow-hidden bg-surface-container-lowest">
<div class="flex items-center justify-center px-4 bg-surface-container-low border-r border-outline-variant/20 text-on-surface-variant font-medium text-sm select-none">
                        +62
                    </div>
<div class="relative flex-grow floating-input">
<input class="peer w-full h-full bg-transparent border-none px-4 pt-2 text-on-surface focus:outline-none focus:ring-0" id="whatsapp" name="whatsapp" placeholder=" " required="" type="tel"/>
<label class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm transition-all pointer-events-none bg-surface-container-lowest px-1" for="whatsapp">Nomor WhatsApp</label>
</div>
</div>
<!-- Password (Floating Label + Toggle) -->
<div class="relative floating-input h-14">
<input class="peer w-full h-full bg-transparent border border-outline-variant/30 rounded-lg pl-4 pr-12 pt-2 text-on-surface focus:outline-none focus:border-surface-tint focus:border-b-2 transition-all" id="password" name="password" placeholder=" " required="" type="password"/>
<label class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant text-sm transition-all pointer-events-none bg-surface-container-lowest px-1" for="password">Password</label>
<button aria-label="Toggle password visibility" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors p-1" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
<!-- Dropdown Info Source -->
<div class="relative h-14">
<select class="w-full h-full bg-transparent border border-outline-variant/30 rounded-lg px-4 text-on-surface focus:outline-none focus:border-surface-tint focus:border-b-2 transition-all appearance-none cursor-pointer" id="source" name="source" required="">
<option disabled="" hidden="" selected="" value="">Dari mana tahu UWU?</option>
<option value="instagram">Instagram</option>
<option value="tiktok">TikTok</option>
<option value="google">Pencarian Google</option>
<option value="teman">Rekomendasi Teman</option>
<option value="wo">Wedding Organizer</option>
<option value="lainnya">Lainnya</option>
</select>
<div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">expand_more</span>
</div>
</div>
<!-- Terms & Conditions Checkbox -->
<div class="flex items-start gap-3 mt-6">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded border-outline-variant/40 text-primary focus:ring-primary focus:ring-offset-surface-container-lowest bg-surface-container-lowest cursor-pointer" id="terms" name="terms" required="" type="checkbox"/>
</div>
<div class="text-sm">
<label class="font-medium text-on-surface-variant cursor-pointer" for="terms">
                            Saya setuju dengan <a class="text-primary hover:text-primary-container hover:underline transition-all" href="#">Syarat &amp; Ketentuan</a> serta <a class="text-primary hover:text-primary-container hover:underline transition-all" href="#">Kebijakan Privasi</a> UWU.
                        </label>
</div>
</div>
<!-- Submit Button (Primary Coral Pulse, Pill Shape as per DS) -->
<div class="pt-4">
<button class="w-full bg-secondary-container text-on-secondary-container hover:bg-[#eb7144] font-semibold text-lg py-4 rounded-full shadow-[0_10px_20px_rgba(254,126,79,0.15)] transition-all transform active:scale-[0.98]" type="submit">
                        Daftar Sekarang
                    </button>
</div>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center text-sm text-on-surface-variant">
                Sudah punya akun? 
                <a class="font-semibold text-primary hover:text-primary-container hover:underline underline-offset-4 transition-all" href="#">Masuk di sini</a>
</div>
</div>
</main>
</body></html>
